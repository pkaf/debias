<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f766e" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; block-all-mixed-content; upgrade-insecure-requests;" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Page not found — deBias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-h) - 6rem);
      text-align: center;
      padding: 3rem 1.25rem;
    }
    .not-found__code {
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--accent);
      margin: 0 0 0.5rem;
    }
    .not-found__title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.75rem;
    }
    .not-found__body {
      color: var(--text-muted);
      max-width: 34rem;
      margin: 0 auto 2rem;
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="index.html" aria-label="deBias home">
        <img class="brand__logo" src="asset/rectangular_logo.png" alt="deBias" width="400" height="220" />
      </a>
      <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="primary-nav" aria-label="Open menu">
        <span class="nav-toggle-bar" aria-hidden="true"></span>
        <span class="nav-toggle-bar" aria-hidden="true"></span>
      </button>
      <nav class="nav" id="primary-nav" aria-label="Primary">
        <a href="services.html">Services</a>
        <a href="training.html">Training</a>
        <a href="conference.html">Conference</a>
        <a href="about.html">About</a>
        <a class="btn btn--primary btn--sm" href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <div class="not-found">
      <p class="not-found__code" aria-hidden="true">404</p>
      <h1 class="not-found__title">Page not found</h1>
      <p class="not-found__body">
        The page you're looking for doesn't exist or has moved.
        Head back to the homepage or use the navigation above.
      </p>
      <a class="btn btn--primary" href="index.html">Go to homepage</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© <span data-year></span> deBias. All rights reserved.</span>
        <span>
          <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a> · <a href="about.html">About</a>
        </span>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
